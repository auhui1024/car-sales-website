<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <mata name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卖家注册页面</title>
    <link rel="stylesheet" href="../css/seller/register.css">
</head>

<body>
    <h2>卖家注册</h2>
    <p id="msg"></p>
     <form onsubmit="return submitRegister()">
        <div class="form-item">
            <label>用户名</label>
            <input type="text" id="sellerUser" placeholder="请输入用户名">
        </div>
        <div class="form-item">
            <label>邮箱</label>
            <input type="email" id="sellerEmail" placeholder="请输入邮箱">
        </div>
        <div class="form-item">
            <label>手机号码</label>
            <input type="tel" id="sellerPhone" placeholder="请输入11位手机号">
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" id="sellerPwd" placeholder="请输入密码">
        </div>
        <div class="form-item">
            <label>确认密码</label>
            <input type="password" id="sellerPwd2" placeholder="请再次输入密码">
        </div>
        <button type="submit">立即注册</button>
    </form>

    <script src="../js/seller/register.js"></script>
</body>
</html>
