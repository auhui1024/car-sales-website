<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卖家新增车辆</title>
    <link rel="stylesheet" href="../css/seller/add-car.css">
 </head>
<body>
    <div class="container">
        <h2>新增车辆 <button onclick="location.href='login.html'" style="width:80px;height:50px;margin-left:250px">登陆</button></h2>
         
        <p id="ad"></p>
        <form onsubmit="return addcar()" novalidate>
            <div class="form-item">
                <label for="model">车型</label>
                <input id="model" type="text" placeholder="请输入车型" required>
            </div>
            <div class="form-item">
                <label for="price">价格（元）</label>
                <input id="price" type="number" min="1" step="0.01" placeholder="请输入价格" required>
            </div>
            <div class="form-item">
                <label for="mileage">里程（公里）</label>
                <input id="mileage" type="number" min="0" step="1" placeholder="请输入行驶里程" required>
            </div>
            <div class="form-item">
                <label for="year">车龄（年）</label>
                <input id="year" type="number" min="0" step="1" placeholder="请输入车龄" required>
            </div>
            <div class="form-item">
                <label for="color">颜色</label>
                <input id="color" type="text" placeholder="请输入车辆颜色" required>
            </div>
            <div class="form-item">
                <label for="describe">车辆描述</label>
                <textarea id="describe" rows="4" placeholder="可填写车辆优点、配置、事故情况等"></textarea>
            </div>
            <div class="form-item">
                <label for="carimage">图片 URL（可选）</label>
                <input id="carimage" type="url" placeholder="https://...">
            </div>
            <button type="submit">添加车辆</button>
        </form>
    </div>
    <script src="../js/seller/add-car.js"></script>
</body>
</html>
